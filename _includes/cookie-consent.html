<div id="cookieConsentRoot" class="fixed inset-x-0 bottom-0 z-[60] hidden px-4 pb-4">
  <section aria-label="Cookie preferences" class="mx-auto w-full max-w-4xl rounded-2xl border border-brandblack/15 bg-white/95 p-4 shadow-lg backdrop-blur-lg transition-colors dark:border-white/20 dark:bg-brandblack/95 md:p-5">
    <div class="space-y-3">
      <p class="text-sm font-semibold text-brandblack/90 dark:text-white/90">Cookie preferences</p>
      <p class="text-sm text-brandblack/80 dark:text-white/80">
        We use essential cookies to run this site. With your consent, we also use Google Analytics to understand site usage.
        See our <a href="/cookies/" class="underline">Cookie Policy</a> and <a href="/privacy/" class="underline">Privacy Policy</a>.
      </p>
      <p class="hidden text-sm text-brandblack/70 dark:text-white/70" data-cookie-manage-copy>
        Analytics cookies are currently <span class="font-semibold" data-cookie-status>off</span>. You can change this at any time.
      </p>
      <div class="flex flex-wrap gap-2">
        <button type="button" data-cookie-action="reject" class="inline-flex items-center justify-center rounded-full border border-brandblack/20 px-5 py-2 text-sm font-semibold text-brandblack shadow-sm transition hover:border-brandblack/40 focus:outline-none focus-visible:ring-2 focus-visible:ring-brandblue/40 dark:border-white/20 dark:text-white dark:hover:border-white/40">
          Reject analytics
        </button>
        <button type="button" data-cookie-action="accept" class="inline-flex items-center justify-center rounded-full bg-brandblue px-5 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-brandblue/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-brandblue/40">
          Accept analytics
        </button>
        <button type="button" data-cookie-action="manage" class="inline-flex items-center justify-center rounded-full border border-brandblack/20 px-5 py-2 text-sm font-semibold text-brandblack/80 transition hover:border-brandblack/40 hover:text-brandblack focus:outline-none focus-visible:ring-2 focus-visible:ring-brandblue/40 dark:border-white/20 dark:text-white/80 dark:hover:border-white/40 dark:hover:text-white">
          Cookie settings
        </button>
      </div>
    </div>
  </section>
</div>
